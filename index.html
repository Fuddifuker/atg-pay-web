<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATG Pay - Premium</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0d0b21; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-soft { animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const INITIAL_RECORDS = [
            { id: "rec_1", type: "RECEIVE", no: "20260319190112244", amount: "299.53", upi: "7849954907@ybl", utr: "823575304308", desc: "Receive ATapllpd deduct 299.530000", transactionTime: "2026-03-19 19:01:10", balance: "40.68" },
            { id: "rec_2", type: "RECEIVE", no: "20260319185442032", amount: "299.15", upi: "7849954907@ybl", utr: "288779455110", desc: "Receive ATapmo6z deduct 299.150000", transactionTime: "2026-03-19 18:53:12", balance: "40.21" }
        ];

        function App() {
            const [view, setView] = useState('home');
            const [showAdmin, setShowAdmin] = useState(false);
            const [editingItem, setEditingItem] = useState(null);
            const [isRefreshing, setIsRefreshing] = useState(false);
            const [googleAuth, setGoogleAuth] = useState(false);

            // LocalStorage Persistence
            const [records, setRecords] = useState(() => {
                const saved = localStorage.getItem('atg_records_v2');
                return saved ? JSON.parse(saved) : INITIAL_RECORDS;
            });

            const [user, setUser] = useState(() => {
                const saved = localStorage.getItem('atg_user_v2');
                return saved ? JSON.parse(saved) : {
                    balance: "40.68",
                    id: "50006770",
                    today: "0.00",
                    recharge: "0.00",
                    commission: "0.00"
                };
            });

            useEffect(() => {
                localStorage.setItem('atg_records_v2', JSON.stringify(records));
                localStorage.setItem('atg_user_v2', JSON.stringify(user));
            }, [records, user]);

            // Simulation of Refreshing
            useEffect(() => {
                if (view === 'history') {
                    setIsRefreshing(true);
                    const timer = setTimeout(() => setIsRefreshing(false), 800);
                    return () => clearTimeout(timer);
                }
            }, [view]);

            // Hidden Admin Trigger (Hold UID for 3 seconds)
            const holdTimer = useRef(null);
            const startHold = () => holdTimer.current = setTimeout(() => setShowAdmin(true), 3000);
            const endHold = () => clearTimeout(holdTimer.current);

            // Components
            const NavIcon = ({ children, label, active, onClick }) => (
                <div onClick={onClick} className="flex flex-col items-center space-y-1 flex-1 cursor-pointer active:scale-90 transition-all">
                    <div className={active ? "text-yellow-400" : "text-slate-500"}>{children}</div>
                    <span className={`text-[10px] font-bold ${active ? 'text-yellow-400' : 'text-slate-500'}`}>{label}</span>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen relative overflow-x-hidden text-white bg-[#0d0b21]">
                    
                    {/* --- HOME VIEW --- */}
                    {view === 'home' && (
                        <div className="px-6 pt-8 pb-40">
                            <div className="flex justify-between items-center mb-8">
                                <div className="flex items-center space-x-2">
                                    <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-purple-600 to-pink-500 flex items-center justify-center text-xl font-bold shadow-lg">A</div>
                                    <h1 className="text-2xl font-black italic tracking-tight">ATG pay <span className="inline-block w-2 h-2 bg-green-400 rounded-full animate-pulse"></span></h1>
                                </div>
                                <div className="w-11 h-11 bg-white/5 rounded-2xl flex items-center justify-center border border-white/10">🔔</div>
                            </div>

                            <div className="bg-gradient-to-br from-[#1e1b4b] to-[#0f172a] p-7 rounded-[35px] border border-white/5 shadow-2xl mb-8">
                                <span className="text-[10px] font-black uppercase text-purple-400 mb-1 block">Status Level</span>
                                <h2 className="text-xl font-black italic mb-4">LV2 · Core User</h2>
                                <div className="w-full bg-black/40 h-2 rounded-full overflow-hidden mb-2">
                                    <div className="bg-purple-500 h-full w-[15%]"></div>
                                </div>
                                <p className="text-[10px] font-bold text-gray-400">Next Level: <span className="text-white">Diamond</span></p>
                            </div>

                            <div className="grid grid-cols-2 gap-4 mb-10">
                                {[
                                    { label: "Main Balance", val: user.balance, color: "text-blue-400", action: () => setView('me') },
                                    { label: "Today Received", val: user.today, color: "text-emerald-400" },
                                    { label: "INR Recharge", val: user.recharge, color: "text-purple-400" },
                                    { label: "Team Bonus", val: user.commission, color: "text-pink-400" }
                                ].map((item, i) => (
                                    <div key={i} onClick={item.action} className="bg-white/5 border border-white/5 rounded-[30px] p-6 flex flex-col items-center active:scale-95 transition-all">
                                        <span className="text-gray-500 text-[9px] font-black uppercase mb-2">{item.label}</span>
                                        <span className={`${item.color} font-black text-2xl`}>₹{item.val}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* --- ME VIEW --- */}
                    {view === 'me' && (
                        <div className="px-6 pt-12 pb-40">
                            <div className="flex items-center space-x-4 mb-10">
                                <div className="w-16 h-16 rounded-3xl bg-gradient-to-tr from-purple-500 to-pink-500 flex items-center justify-center text-3xl">👤</div>
                                <div>
                                    <h3 className="text-xl font-black italic">Verified Account</h3>
                                    <p onMouseDown={startHold} onMouseUp={endHold} onTouchStart={startHold} onTouchEnd={endHold} className="text-gray-500 font-bold select-none">UID: {user.id}</p>
                                </div>
                            </div>

                            <div className="bg-white/5 p-8 rounded-[32px] border border-white/10 mb-8">
                                <p className="text-blue-400 font-black text-[10px] uppercase mb-2">Available Balance</p>
                                <div className="flex justify-between items-end">
                                    <h2 className="text-4xl font-black">₹{user.balance}</h2>
                                    <button className="bg-white text-black px-5 py-2 rounded-xl font-black text-[11px] uppercase">Add Cash</button>
                                </div>
                            </div>

                            <div className="space-y-4">
                                <div onClick={() => setView('history')} className="flex items-center justify-between p-5 bg-white/5 rounded-3xl border border-white/5 active:bg-white/10 cursor-pointer">
                                    <span className="font-bold">📑 Token History</span>
                                    <span>›</span>
                                </div>
                                <div className="flex items-center justify-between p-5 bg-white/5 rounded-3xl border border-white/5 opacity-50">
                                    <span className="font-bold">🚪 Log Out</span>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- HISTORY VIEW --- */}
                    {view === 'history' && (
                        <div className="pb-40">
                            <div className="flex items-center px-4 py-6 sticky top-0 bg-[#0d0b21] z-50">
                                <button onClick={() => setView('me')} className="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 text-xl">‹</button>
                                <h2 className="flex-1 text-center font-bold text-lg mr-10">Token History</h2>
                            </div>

                            <div className={`flex justify-center transition-all ${isRefreshing ? 'h-10' : 'h-0 opacity-0'}`}>
                                <span className="text-[10px] font-black text-purple-400 animate-pulse">REFRESHING...</span>
                            </div>

                            <div className="px-5 space-y-4">
                                {records.map(item => (
                                    <div key={item.id} className="bg-white/5 rounded-[32px] p-6 border border-white/5">
                                        <div className="flex justify-between mb-4">
                                            <span className="bg-purple-600 px-3 py-1 rounded text-[10px] font-black">{item.type}</span>
                                            <span className="text-xs text-gray-500">{item.transactionTime}</span>
                                        </div>
                                        <div className="space-y-2 text-sm">
                                            <div className="flex justify-between"><span className="text-gray-400">UTR</span><span className="font-bold">{item.utr}</span></div>
                                            <div className="flex justify-between"><span className="text-gray-400">Amount</span><span className="text-blue-400 font-black">₹{item.amount}</span></div>
                                            <div className="flex justify-between pt-2 border-t border-white/5"><span className="text-gray-400">New Balance</span><span className="text-green-400 font-black">₹{item.balance}</span></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* --- PLACEHOLDER VIEWS --- */}
                    {(view === 'payment' || view === 'upi' || view === 'team') && (
                        <div className="h-screen flex flex-col items-center justify-center p-10 text-center">
                            <div className="text-4xl mb-4">🛠️</div>
                            <p className="font-black italic opacity-40 mb-8 uppercase">Section Under Maintenance</p>
                            <button onClick={() => setView('home')} className="px-8 py-3 border border-blue-500 rounded-full text-blue-500 text-xs font-black">GO BACK</button>
                        </div>
                    )}

                    {/* --- MASTER ADMIN CONSOLE --- */}
                    {showAdmin && (
                        <div className="fixed inset-0 z-[100] bg-black p-6 overflow-y-auto pb-40">
                            <div className="flex justify-between items-center mb-10 border-b border-white/10 pb-6">
                                <h2 className="font-black text-xl text-blue-500">MASTER CONSOLE</h2>
                                <button onClick={() => setShowAdmin(false)} className="bg-red-500 text-white px-4 py-1 rounded-lg text-xs font-bold">EXIT</button>
                            </div>

                            <div className="space-y-6">
                                <div className="bg-white/5 p-4 rounded-xl">
                                    <h4 className="text-[10px] font-black text-gray-500 uppercase mb-4">Edit Balance & User</h4>
                                    {['balance', 'today', 'recharge', 'commission', 'id'].map(key => (
                                        <div key={key} className="mb-3">
                                            <label className="text-[10px] uppercase block mb-1">{key}</label>
                                            <input className="w-full bg-black border border-white/20 p-2 rounded text-white font-bold" value={user[key]} onChange={e => setUser({...user, [key]: e.target.value})} />
                                        </div>
                                    ))}
                                </div>

                                <h4 className="text-[10px] font-black text-gray-500 uppercase">Recent Transactions</h4>
                                {records.map(r => (
                                    <div key={r.id} onClick={() => setEditingItem(r)} className="p-4 bg-white/5 rounded-xl border border-white/5 flex justify-between">
                                        <span>₹{r.amount}</span>
                                        <span className="text-blue-500">Edit</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* --- TRANSACTION EDITOR --- */}
                    {editingItem && (
                        <div className="fixed inset-0 z-[110] bg-[#050505] p-6 overflow-y-auto">
                            <h3 className="font-black mb-6">MODIFY RECORD</h3>
                            {Object.keys(editingItem).filter(k => k !== 'id').map(key => (
                                <div key={key} className="mb-4">
                                    <label className="text-[10px] uppercase block mb-1 text-gray-500">{key}</label>
                                    <input className="w-full bg-white/5 border border-white/10 p-3 rounded" value={editingItem[key]} onChange={e => setEditingItem({...editingItem, [key]: e.target.value})} />
                                </div>
                            ))}
                            <div className="flex space-x-4 mt-8">
                                <button onClick={() => setEditingItem(null)} className="flex-1 p-4 bg-white/5 rounded-2xl font-bold">Cancel</button>
                                <button onClick={() => {
                                    setRecords(records.map(r => r.id === editingItem.id ? editingItem : r));
                                    setEditingItem(null);
                                }} className="flex-1 p-4 bg-blue-600 rounded-2xl font-bold">Save</button>
                            </div>
                        </div>
                    )}

                    {/* --- NAVIGATION BAR --- */}
                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-[#131416]/95 backdrop-blur-md flex justify-between items-center px-4 pt-4 pb-8 border-t border-white/5 z-50">
                        <NavIcon label="Home" active={view === 'home'} onClick={() => setView('home')}>
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                        </NavIcon>
                        <NavIcon label="Deposit" active={view === 'payment'} onClick={() => setView('payment')}>
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
                        </NavIcon>
                        
                        <div className="flex-1 flex justify-center -mt-12">
                            <div onClick={() => setView('upi')} className={`w-14 h-14 rounded-2xl rotate-[15deg] flex items-center justify-center shadow-xl transition-all ${view === 'upi' ? 'bg-purple-600 scale-110' : 'bg-[#222327]'}`}>
                                <span className="-rotate-[15deg] font-black text-xs">UPI</span>
                            </div>
                        </div>

                        <NavIcon label="Team" active={view === 'team'} onClick={() => setView('team')}>
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                        </NavIcon>
                        <NavIcon label="Me" active={view === 'me' || view === 'history'} onClick={() => setView('me')}>
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </NavIcon>
                    </nav>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
