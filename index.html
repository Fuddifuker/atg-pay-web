<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATG Pay - Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Firebase Mock/Init Logic ---
        // Note: In production, these variables are usually injected by your environment
        const firebaseConfig = window.__firebase_config ? JSON.parse(window.__firebase_config) : {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "ID",
            appId: "APP_ID"
        };

        // Static Constants
        const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'atg-pay-v3-prod';
        const GLOBAL_STYLES = `
          @keyframes slideUpFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
          @keyframes blob { 0% { transform: translate(0px, 0px) scale(1); } 33% { transform: translate(30px, -50px) scale(1.1); } 66% { transform: translate(-20px, 20px) scale(0.9); } 100% { transform: translate(0px, 0px) scale(1); } }
          .animate-blob { animation: blob 7s infinite alternate; }
          .animate-slide-up { animation: slideUpFade 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
          .shimmer-bg { background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%); background-size: 200% 100%; animation: shimmer 3s infinite linear; }
          @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        `;

        const INITIAL_TOKENS = [
          { id: "t1", type: "Receive", no: "20260319190112244", amount: "299.53", upi: "7849954907@ybl", utr: "823575304308", desc: "Receive ATapllpd deduct 299.530000", transactionTime: "2026-03-19 19:01:10", balance: "40.68" },
          { id: "t2", type: "Receive", no: "20260319185442032", amount: "299.15", upi: "7849954907@ybl", utr: "288779455110", desc: "Receive ATapmo6z deduct 299.150000", transactionTime: "2026-03-18 18:53:12", balance: "40.21" }
        ];

        function App() {
          const [activeTab, setActiveTab] = useState('home');
          const [currentSubView, setCurrentSubView] = useState(null);
          const [showAdmin, setShowAdmin] = useState(false);
          const [userData, setUserData] = useState({ phone: '7849954907', balance: 40.68, id: "50006770", level: "LV2" });
          const [tokens, setTokens] = useState(INITIAL_TOKENS);
          const [editingToken, setEditingToken] = useState(null);
          const timerRef = useRef(null);

          // Simulated Auth & Data Sync (Replace with Firebase SDK imports if using full Firebase)
          useEffect(() => {
            console.log("App Initialized with Config", firebaseConfig);
          }, []);

          const startTimer = () => { timerRef.current = setTimeout(() => setShowAdmin(true), 3000); };
          const clearTimer = () => { if (timerRef.current) clearTimeout(timerRef.current); };

          const updateProfile = (field, val) => {
            setUserData(prev => ({ ...prev, [field]: val }));
          };

          const saveTokenEdit = () => {
            setTokens(tokens.map(t => t.id === editingToken.id ? editingToken : t));
            setEditingToken(null);
          };

          return (
            <div className="bg-[#F8F9FB] min-h-screen max-w-md mx-auto relative pb-24 font-sans overflow-x-hidden border-x border-gray-100 shadow-xl">
              <style>{GLOBAL_STYLES}</style>

              {/* --- MASTER ADMIN PANEL --- */}
              {showAdmin && (
                <div className="fixed inset-0 z-[1000] bg-black text-white p-6 overflow-y-auto">
                  <div className="flex justify-between items-center mb-8 border-b border-white/20 pb-4">
                    <h2 className="font-black italic text-purple-400 uppercase tracking-tighter">Master Editor</h2>
                    <button onClick={() => setShowAdmin(false)} className="bg-red-600 px-4 py-1 rounded-full text-[10px] font-bold uppercase">Exit</button>
                  </div>

                  <div className="space-y-4 mb-10 bg-white/5 p-4 rounded-2xl">
                    <p className="text-[10px] font-bold text-gray-500 uppercase">Profile Settings</p>
                    <div className="grid grid-cols-2 gap-2">
                      <div className="space-y-1">
                        <label className="text-[9px] text-gray-400">Balance</label>
                        <input className="w-full bg-black border border-white/20 p-2 rounded text-xs" type="number" value={userData.balance} onChange={e => updateProfile('balance', parseFloat(e.target.value))} />
                      </div>
                      <div className="space-y-1">
                        <label className="text-[9px] text-gray-400">User ID</label>
                        <input className="w-full bg-black border border-white/20 p-2 rounded text-xs" type="text" value={userData.id} onChange={e => updateProfile('id', e.target.value)} />
                      </div>
                    </div>
                  </div>

                  <p className="text-[10px] font-bold text-gray-500 uppercase mb-4">Transaction History Editor</p>
                  <div className="space-y-3">
                    {tokens.map(t => (
                      <div key={t.id} className="bg-white/10 p-4 rounded-xl flex justify-between items-center border border-white/10">
                        <div className="text-[10px]">
                          <p className="font-black text-purple-300 italic">UTR: {t.utr}</p>
                          <p>₹{t.amount} | {t.upi}</p>
                        </div>
                        <button onClick={() => setEditingToken(t)} className="bg-purple-600 px-3 py-1 rounded text-[10px] font-black uppercase">Edit</button>
                      </div>
                    ))}
                  </div>

                  {editingToken && (
                    <div className="fixed inset-0 z-[1100] bg-[#0a0a0a] p-6 overflow-y-auto">
                      <h3 className="font-black text-xl mb-6 italic text-purple-400">Modify Record</h3>
                      <div className="space-y-4 pb-10">
                        {Object.keys(editingToken).filter(k => k !== 'id').map(key => (
                          <div key={key}>
                            <label className="text-[10px] text-gray-500 uppercase font-black">{key}</label>
                            <input className="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm text-white" value={editingToken[key]} onChange={e => setEditingToken({...editingToken, [key]: e.target.value})} />
                          </div>
                        ))}
                        <button onClick={saveTokenEdit} className="w-full bg-emerald-600 py-4 rounded-2xl font-black uppercase shadow-2xl mt-4">Save Changes</button>
                        <button onClick={() => setEditingToken(null)} className="w-full text-gray-500 font-bold uppercase text-[10px] py-2 text-center">Cancel</button>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* --- MAIN UI --- */}
              {currentSubView === 'token_history' ? (
                <div className="fixed inset-0 bg-white z-[150] animate-slide-up overflow-y-auto pb-20 max-w-md mx-auto">
                  <header className="px-4 py-4 flex items-center border-b sticky top-0 bg-white z-50">
                     <button onClick={() => setCurrentSubView(null)} className="p-2 text-[#5e2d91]"><ArrowBackIcon /></button>
                     <h2 className="flex-1 text-center text-[18px] font-bold text-gray-800 pr-8 tracking-tight">Token History</h2>
                  </header>
                  <div className="p-4">
                     {tokens.map(token => (
                       <div key={token.id} className="mb-8 border-b border-gray-50 pb-6">
                         <span className="px-2 py-0.5 rounded bg-pink-100 text-pink-600 text-[10px] font-bold uppercase mb-4 inline-block">{token.type}</span>
                         <div className="space-y-2">
                           <TokenRow l="No" v={token.no} p />
                           <TokenRow l="Amount" v={token.amount} p />
                           <TokenRow l="UPI" v={token.upi} p />
                           <TokenRow l="UTR" v={token.utr} p />
                           <TokenRow l="Time" v={token.transactionTime} p />
                           <TokenRow l="Desc" v={token.desc} p />
                           <TokenRow l="Balance" v={token.balance} p />
                         </div>
                       </div>
                     ))}
                  </div>
                </div>
              ) : activeTab === 'home' ? (
                <div className="p-4 pt-6 space-y-6 animate-slide-up">
                  <header className="flex justify-between items-center">
                    <h1 className="text-2xl font-black text-[#5e2d91] italic tracking-tighter">ATG pay</h1>
                    <div className="w-10 h-10 rounded-2xl bg-white shadow-sm flex items-center justify-center text-gray-400">🔔</div>
                  </header>

                  <div className="relative overflow-hidden bg-gradient-to-br from-[#ac7cfb] to-[#5e2d91] rounded-[32px] p-7 text-white shadow-2xl shadow-purple-200">
                     <div className="shimmer-bg absolute inset-0 opacity-20"></div>
                     <div className="relative z-10">
                       <div className="flex justify-between mb-8">
                          <div>
                            <span className="text-[10px] font-black uppercase opacity-70 tracking-widest">Available Balance</span>
                            <h2 className="text-3xl font-black italic tracking-tighter">₹ {userData.balance.toFixed(2)}</h2>
                          </div>
                          <div className="bg-white/20 px-3 py-1 rounded-full text-[9px] font-black uppercase">{userData.level}</div>
                       </div>
                       <div className="w-full bg-black/10 h-[6px] rounded-full mb-3">
                         <div className="bg-white w-[12%] h-full rounded-full"></div>
                       </div>
                       <div className="text-center font-black text-[#fde047] text-[10px] uppercase tracking-widest">Boost rewards active ⚡</div>
                     </div>
                  </div>

                  <div className="bg-white rounded-[40px] p-2 shadow-xl border border-white grid grid-cols-2
