<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATG Pay Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const INITIAL_RECORDS = [
            {
                id: "rec_1", type: "RECEIVE", no: "20260319190112244", amount: "299.53",
                upi: "7849954907@ybl", utr: "823575304308", desc: "Receive ATapllpd deduct 299.530000",
                transactionTime: "2026-03-19 19:01:10", deductionTime: "2026-03-19 19:01:12", balance: "40.68"
            },
            {
                id: "rec_2", type: "RECEIVE", no: "20260319185442032", amount: "299.15",
                upi: "7849954907@ybl", utr: "288779455110", desc: "Receive ATapmo6z deduct 299.150000",
                transactionTime: "2026-03-19 18:53:12", deductionTime: "2026-03-19 18:54:42", balance: "40.21"
            }
        ];

        function App() {
            const [view, setView] = useState('home');
            const [showAdmin, setShowAdmin] = useState(false);
            const [editingItem, setEditingItem] = useState(null);
            const [records, setRecords] = useState(() => {
                const saved = localStorage.getItem('atg_records');
                return saved ? JSON.parse(saved) : INITIAL_RECORDS;
            });
            const [user, setUser] = useState(() => {
                const saved = localStorage.getItem('atg_user');
                return saved ? JSON.parse(saved) : { balance: "40.68", id: "50006770", today: "0.00", recharge: "0.00", commission: "0.00" };
            });

            const holdTimer = useRef(null);

            useEffect(() => {
                localStorage.setItem('atg_records', JSON.stringify(records));
                localStorage.setItem('atg_user', JSON.stringify(user));
            }, [records, user]);

            const onHoldStart = () => holdTimer.current = setTimeout(() => setShowAdmin(true), 2500);
            const onHoldEnd = () => clearTimeout(holdTimer.current);

            // --- Sub-components ---
            const TokenHistory = () => (
                <div className="min-h-screen bg-[#0d0b21] text-white animate-in pb-32">
                    <div className="flex items-center px-4 py-6 sticky top-0 bg-[#0d0b21]/90 backdrop-blur-md z-50">
                        <button onClick={() => setView('me')} className="w-10 h-10 flex items-center justify-center rounded-full bg-white/5">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                        </button>
                        <h2 className="flex-1 text-center font-bold text-lg mr-10">Token History</h2>
                    </div>
                    <div className="px-5 space-y-6">
                        {records.map((item) => (
                            <div key={item.id} className="bg-white/5 rounded-[32px] p-6 border border-white/5 shadow-2xl">
                                <div className="flex justify-between items-center mb-6">
                                    <span className="bg-[#5e2d91] text-white text-[10px] font-black px-3.5 py-1.5 rounded-lg tracking-widest uppercase">{item.type}</span>
                                    <span className="text-[11px] text-gray-500 font-bold">{item.transactionTime.split(' ')[0]}</span>
                                </div>
                                <div className="space-y-4">
                                    <Row label="No" val={item.no} color="text-purple-300" />
                                    <Row label="Amount" val={`₹${item.amount}`} color="text-blue-400 font-black text-base" />
                                    <Row label="UPI" val={item.upi} color="text-gray-300" />
                                    <Row label="UTR" val={item.utr} color="text-white font-bold" />
                                    <Row label="Balance" val={`₹${item.balance}`} color="text-emerald-400 font-black" border />
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const Row = ({ label, val, color, border }) => (
                <div className={`flex justify-between items-start text-[13px] ${border ? 'pt-3 border-t border-white/10' : ''}`}>
                    <span className="text-gray-500 font-medium">{label}</span>
                    <span className={`${color} text-right ml-4 break-all`}>{val}</span>
                </div>
            );

            const MePage = () => (
                <div className="min-h-screen bg-white animate-in pb-24">
                    <div className="px-6 pt-12 pb-6">
                        <div className="flex items-center space-x-2 text-[#5e2d91] font-black mb-1">
                            <span className="text-xl">👤</span>
                            <span className="text-lg">Edit profile</span>
                        </div>
                        <p onMouseDown={onHoldStart} onMouseUp={onHoldEnd} onTouchStart={onHoldStart} onTouchEnd={onHoldEnd}
                           class="text-[#5e2d91] font-bold text-[15px] mb-8 opacity-60 select-none">ID: {user.id}</p>
                        
                        <div className="flex justify-between items-center mb-10">
                            <div>
                                <span className="text-[#5e2d91] font-black text-[10px] uppercase tracking-wider block opacity-50">Total Balance</span>
                                <div className="flex items-baseline">
                                    <span className="text-[46px] font-black text-[#5e2d91] tracking-tighter">{user.balance}</span>
                                    <span className="text-[#5e2d91] font-black text-sm ml-2">INR</span>
                                </div>
                            </div>
                            <button className="bg-[#5e2d91] text-white px-8 py-3 rounded-full font-black text-sm shadow-lg active:scale-95 transition-transform">Top up</button>
                        </div>

                        <div className="bg-gradient-to-r from-[#7c5cfc] to-[#6343cb] rounded-[24px] p-6 text-white shadow-xl mb-8">
                            <h3 className="font-bold text-[17px] mb-1">Refer & get rewarded</h3>
                            <p className="text-white/70 text-sm">Grow your team, grow your income.</p>
                        </div>

                        <div className="space-y-1">
                            <MenuItem label="Recharge History" icon="⏰" />
                            <MenuItem label="Token History" icon="📄" action={() => setView('history')} />
                            <MenuItem label="Languages" icon="🌐" right="English" />
                            <MenuItem label="Contact Us" icon="💬" />
                        </div>
                    </div>
                </div>
            );

            const MenuItem = ({ label, icon, action, right }) => (
                <div onClick={action} className="flex items-center justify-between p-5 border-b border-gray-50 active:bg-gray-50 cursor-pointer">
                    <div className="flex items-center space-x-4">
                        <span className="text-xl">{icon}</span>
                        <span className="text-[15px] font-bold text-gray-800">{label}</span>
                    </div>
                    <div className="flex items-center space-x-2 text-gray-400 font-bold">
                        {right && <span className="text-sm">{right}</span>}
                        <span>›</span>
                    </div>
                </div>
            );

            const HomePage = () => (
                <div className="min-h-screen bg-[#fcfaff] pb-32 animate-in">
                    <div className="px-6 pt-8">
                        <div className="flex justify-between items-center mb-8">
                            <h1 className="text-[#5e2d91] text-2xl font-black tracking-tighter">ATG pay <span className="inline-block w-2 h-2 bg-green-500 rounded-full ml-1 animate-pulse"></span></h1>
                            <div className="w-10 h-10 bg-white shadow-sm rounded-full flex items-center justify-center text-lg">🔔</div>
                        </div>
                        
                        <div className="bg-gradient-to-br from-[#8b5cf6] to-[#5e2d91] rounded-[32px] p-7 text-white shadow-2xl mb-8 relative overflow-hidden">
                            <div className="relative z-10">
                                <span className="text-[10px] font-black uppercase tracking-widest opacity-60">Account Level</span>
                                <h2 className="font-black text-2xl italic mb-6">LV2 · Core User</h2>
                                <div className="w-full bg-black/20 h-2 rounded-full mb-4"><div className="bg-white h-full w-[15%] rounded-full shadow-[0_0_10px_white]"></div></div>
                                <div className="flex justify-between text-[10px] font-black uppercase text-yellow-300">
                                    <span>Progress</span>
                                    <span>0% Complete</span>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-4 mb-10">
                            <StatCard label="Balance" val={user.balance} onClick={() => setView('me')} />
                            <StatCard label="Today" val={user.today} />
                            <StatCard label="Recharge" val={user.recharge} />
                            <StatCard label="Commission" val={user.commission} />
                        </div>

                        <h2 className="text-[#5e2d91] text-xl font-black italic mb-6">Guides</h2>
                        <div className="space-y-4">
                            <div className="bg-white p-5 rounded-[28px] border border-gray-100 flex items-center justify-between shadow-sm">
                                <div className="flex items-center space-x-4">
                                    <div className="w-12 h-12 bg-indigo-50 rounded-2xl flex items-center justify-center text-xl">🏛️</div>
                                    <span className="text-[#5e2d91] font-black text-sm">Bank Setup Tutorial</span>
                                </div>
                                <span className="text-[#5e2d91] font-black">Play ›</span>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const StatCard = ({ label, val, onClick }) => (
                <div onClick={onClick} className="bg-white border border-gray-100 rounded-3xl p-5 shadow-sm active:scale-95 transition-all cursor-pointer">
                    <span className="text-gray-400 text-[10px] font-black uppercase block mb-1 tracking-tighter">{label}</span>
                    <span className="text-[#5e2d91] font-black text-lg italic">₹{val}</span>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white shadow-2xl relative overflow-x-hidden">
                    {view === 'home' && <HomePage />}
                    {view === 'me' && <MePage />}
                    {view === 'history' && <TokenHistory />}

                    <nav className="fixed bottom-0 left-0 right-0 w-full max-w-md mx-auto bg-white/90 backdrop-blur-xl border-t border-gray-100 flex justify-around items-center pt-3 pb-8 z-50">
                        {['home', 'payment', 'upi', 'team', 'me'].map((id) => (
                            <div key={id} onClick={() => setView(id === 'me' || id === 'home' ? id : 'maintenance')} 
                                 className={`flex flex-col items-center transition-all ${view === id || (id === 'me' && view === 'history') ? 'text-[#5e2d91] scale-110 opacity-100' : 'opacity-20'}`}>
                                <span className="text-2xl mb-1">{id === 'home' ? '🏠' : id === 'payment' ? '💳' : id === 'upi' ? '💼' : id === 'team' ? '👥' : '👤'}</span>
                                <span className="text-[8px] font-black uppercase tracking-tighter">{id}</span>
                            </div>
                        ))}
                    </nav>

                    {/* Admin Panel Overlay */}
                    {showAdmin && (
                        <div className="fixed inset-0 z-[100] bg-black text-white p-6 overflow-y-auto animate-in">
                            <div className="flex justify-between items-center mb-8 border-b border-white/10 pb-4">
                                <h2 className="font-black text-blue-500 uppercase tracking-widest">Master Console</h2>
                                <button onClick={() => setShowAdmin(false)} className="bg-red-500 text-white px-4 py-1 rounded-full text-[10px] font-black">Exit</button>
                            </div>
                            <div className="space-y-4 mb-10">
                                {Object.keys(user).map(key => (
                                    <div key={key} className="bg-white/5 p-3 rounded-xl">
                                        <label className="text-[10px] text-gray-500 uppercase font-black">{key}</label>
                                        <input className="w-full bg-transparent text-white text-lg font-bold outline-none" value={user[key]} onChange={e => setUser({...user, [key]: e.target.value})} />
                                    </div>
                                ))}
                            </div>
                            <h3 className="text-gray-500 text-[10px] font-black uppercase mb-4">Edit Tokens</h3>
                            <div className="space-y-2">
                                {records.map(r => (
                                    <div key={r.id} onClick={() => setEditingItem(r)} className="bg-white/5 p-4 rounded-xl flex justify-between items-center border border-white/5">
                                        <span className="font-bold">₹{r.amount}</span>
                                        <span className="text-xs opacity-40">Edit ›</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Record Editor Modal */}
                    {editingItem && (
                        <div className="fixed inset-0 z-[110] bg-black text-white p-6 overflow-y-auto">
                            <h3 className="font-black text-purple-400 uppercase mb-8">Edit Record Node</h3>
                            <div className="space-y-4">
                                {Object.keys(editingItem).filter(k => k !== 'id').map(key => (
                                    <div key={key}>
                                        <label className="text-[10px] text-gray-500 font-black uppercase">{key}</label>
                                        <input className="w-full bg-white/5 border border-white/10 p-3 rounded-xl text-sm" value={editingItem[key]} onChange={e => setEditingItem({...editingItem, [key]: e.target.value})} />
                                    </div>
                                ))}
                                <button onClick={() => { setRecords(records.map(r => r.id === editingItem.id ? editingItem : r)); setEditingItem(null); }}
                                        className="w-full bg-emerald-600 py-4 rounded-2xl font-black uppercase mt-4">Save to Cloud</button>
                                <button onClick={() => setEditingItem(null)} className="w-full text-gray-500 py-4 font-black uppercase text-xs">Cancel</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
